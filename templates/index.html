<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Checkpoints</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <!-- Title Card -->
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body p-4 text-center">
                        <h2 class="card-title text-primary fw-bold mb-0">Image Checkpoints</h2>
                        <p class="text-muted mt-2">Analyze webpages to extract and audit PNG, SVG, and JPEG images.</p>
                    </div>
                </div>

                <!-- Input Card -->
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body p-4">
                        <form id="analyzeForm">
                            <div class="mb-3">
                                <label for="urlInput" class="form-label fw-semibold">Website URLs (One per line)</label>
                                <textarea class="form-control" id="urlInput" rows="4" placeholder="https://example.com&#10;https://another.com" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100" id="analyzeBtn">Analyze Webpage</button>
                        </form>
                    </div>
                </div>

                <!-- Error Alert -->
                <div class="alert alert-danger d-none shadow-sm" id="errorAlert" role="alert">
                </div>

                <!-- Progress Section -->
                <div class="card shadow-sm mb-4 border-0 d-none" id="progressCard">
                    <div class="card-body p-5 text-center">
                        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h4 class="mb-2" id="progressText">Launching Browser...</h4>
                        <p class="text-muted" id="progressSubtext">Please wait while we set up the environment.</p>
                    </div>
                </div>

                <!-- Results Section -->
                <div class="card shadow-sm border-0 d-none" id="resultsCard">
                    <div class="card-body p-4 text-center">
                        <h4 class="mb-4 text-success fw-bold">Analysis Complete!</h4>
                        
                        <div class="row g-3 mb-4">
                            <div class="col-6 col-md-3">
                                <div class="p-3 bg-light rounded shadow-sm">
                                    <h2 class="mb-0 text-primary" id="totalImages">0</h2>
                                    <small class="text-muted">Total Images</small>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 bg-light rounded shadow-sm">
                                    <h2 class="mb-0 text-primary" id="pngCount">0</h2>
                                    <small class="text-muted">PNGs</small>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 bg-light rounded shadow-sm">
                                    <h2 class="mb-0 text-primary" id="svgCount">0</h2>
                                    <small class="text-muted">SVGs</small>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 bg-light rounded shadow-sm">
                                    <h2 class="mb-0 text-primary" id="jpegCount">0</h2>
                                    <small class="text-muted">JPEGs</small>
                                </div>
                            </div>
                        </div>

                        <a href="#" id="downloadBtn" class="btn btn-success btn-lg w-100">
                            Download Excel Report
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
